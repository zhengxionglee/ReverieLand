<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.subtitle }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/novel/' | relative_url }}">小说</a>
        <a href="{{ '/gushi/' | relative_url }}">古诗</a>
        <a href="{{ '/guci/' | relative_url }}">古词</a>
        <a href="{{ '/xiandaishi/' | relative_url }}">现代诗</a>
        <a href="{{ '/duilian/' | relative_url }}">对联</a>
        <a href="{{ '/sanwen/' | relative_url }}">散文</a>
        <span class="nav-divider">·</span>
        <a href="{{ '/tech/' | relative_url }}">技术遐想</a>
        <a href="{{ '/overtones/' | relative_url }}">弦外之音</a>
        <span class="nav-divider">·</span>
        <a href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </div>
  </header>

  <main class="container site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ site.time | date: '%Y' }} {{ site.title }} · {{ site.subtitle }} · 用 <a href="https://jekyllrb.com">Jekyll</a> 搭建，托管在 GitHub Pages</p>
      <p class="footer-quote">「不为无益之事，何以遣有涯之生」</p>
    </div>
  </footer>
</body>
</html>
