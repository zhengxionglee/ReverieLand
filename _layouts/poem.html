---
layout: default
---

<article class="work poem-work">
  <header class="work-header">
    <p class="work-genre">现代诗</p>
    <h1 class="work-title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="work-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <p class="work-meta">
      <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.author %} · {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="poem-body">
    {{ content }}
  </div>

  {% if page.notes %}
    <aside class="work-notes">
      <h3>创作手记</h3>
      <p>{{ page.notes }}</p>
    </aside>
  {% endif %}

  <nav class="work-nav">
    <a href="{{ '/xiandaishi-collections/xing-lu-nan/' | relative_url }}">← 返回诗集《行路难》</a>
  </nav>
</article>
