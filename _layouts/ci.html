---
layout: default
---

<article class="work ci-work">
  <header class="work-header">
    <p class="work-genre">古词</p>
    <h1 class="work-title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="work-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <p class="work-meta">
      <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.author %} · {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="ci-body">
    {{ content }}
  </div>

  {% include prev-next.html %}

  <nav class="work-nav">
    <a href="{{ '/guci/' | relative_url }}">← 返回古词</a>
  </nav>
</article>
