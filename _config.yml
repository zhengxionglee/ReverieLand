title: 拾墨斋
subtitle: 一个人的文学小院
description: 收录小说、古诗、古词、现代诗、对联、散文、技术遐想、弦外之音。慢慢写，慢慢读。
author: 你的名字
email: 1927743354@qq.com

# GitHub Pages 配置
# 项目仓库：url 留空，baseurl 填 /仓库名
url: "https://zhengxionglee.github.io"
baseurl: "/ReverieLand"

# 不使用远程主题（自定义样式写在 assets/css/style.css）
# theme: minima
# remote_theme: pages-themes/architect@v0.2.0

# 永久链接格式：/:collection/:year-:month-:day-:title/
permalink: /:collection/:year-:month-:day-:title/

# Jekyll 配置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 集合（collections）：按栏目分类
collections:
  # 文学
  novel:
    output: true
    permalink: /novel/:path/
  gushi:
    output: true
    permalink: /gushi/:path/
  guci:
    output: true
    permalink: /guci/:path/
  xiandaishi:
    output: true
    permalink: /xiandaishi/:path/
  duilian:
    output: true
    permalink: /duilian/:path/
  sanwen:
    output: true
    permalink: /sanwen/:path/
  # 工程技术（Tech Reveries · 技术遐想）
  tech:
    output: true
    permalink: /tech/:path/
  # 音乐（Overtones · 弦外之音）
  overtones:
    output: true
    permalink: /overtones/:path/

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  # 文学体裁
  - scope:
      path: ""
      type: novel
    values:
      layout: work
      genre: 小说
  - scope:
      path: ""
      type: gushi
    values:
      layout: work
      genre: 古诗
  - scope:
      path: ""
      type: guci
    values:
      layout: work
      genre: 古词
  - scope:
      path: ""
      type: xiandaishi
    values:
      layout: work
      genre: 现代诗
  - scope:
      path: ""
      type: duilian
    values:
      layout: work
      genre: 对联
  - scope:
      path: ""
      type: sanwen
    values:
      layout: work
      genre: 散文
  # 新栏目
  - scope:
      path: ""
      type: tech
    values:
      layout: work
      genre: 技术遐想
  - scope:
      path: ""
      type: overtones
    values:
      layout: work
      genre: 弦外之音

# 不让 Jekyll 构建这些
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache