title: 遐想之地
subtitle: ReverieLand
description: 不为无益之事，何以遣有涯之生。收录小说、古诗、古词、现代诗、对联、散文、弦外。
author: 你的名字
email: 1927743354@qq.com

# 站名 slogan（显示在主页 hero 区）
slogan: 不为无益之事，何以遣有涯之生
slogan_en: Do useless things. Dream out loud. Pass the time.

# GitHub Pages 配置
# 项目仓库：url 留空，baseurl 填 /仓库名
url: "https://zhengxionglee.github.io"
baseurl: "/ReverieLand"

# 不使用远程主题（自定义样式写在 assets/css/style.css）
# theme: minima
# remote_theme: pages-themes/architect@v0.2.0

# 永久链接格式：/:collection/:year-:month-:day-:title/
permalink: /:collection/:year-:month-:day-:title/

# Jekyll 配置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 集合（collections）：按栏目分类
collections:
  # 文学
  novel:
    output: true
    permalink: /novel/:path/
  gushi:
    output: true
    permalink: /gushi/:path/
  # 古诗合集（如《怀思集》《行路集》收录多首古诗）
  gushi_collections:
    output: true
    permalink: /gushi-collections/:path/
  guci:
    output: true
    permalink: /guci/:path/
  xiandaishi:
    output: true
    permalink: /xiandaishi/:path/
  # 现代诗合集（poetry collection，容纳《行路难》等诗集）
  xiandaishi_collections:
    output: true
    permalink: /xiandaishi-collections/:path/
  duilian:
    output: true
    permalink: /duilian/:path/
  # 对联合集（如《缀玉集》收录多副对联）
  duilian_collections:
    output: true
    permalink: /duilian-collections/:path/
  sanwen:
    output: true
    permalink: /sanwen/:path/
  # 弦外（Overtones · 歌词赏析）
  overtones:
    output: true
    permalink: /overtones/:path/

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  # 文学体裁
  - scope:
      path: ""
      type: novel
    values:
      layout: work
      genre: 小说
  - scope:
      path: ""
      type: gushi
    values:
      layout: gushi
      genre: 古诗
  - scope:
      path: ""
      type: gushi_collections
    values:
      layout: gushi-collection
      genre: 古诗集
  - scope:
      path: ""
      type: guci
    values:
      layout: ci
      genre: 古词
  - scope:
      path: ""
      type: xiandaishi
    values:
      layout: poem
      genre: 现代诗
  - scope:
      path: ""
      type: xiandaishi_collections
    values:
      layout: collection
      genre: 诗集
  - scope:
      path: ""
      type: duilian
    values:
      layout: work
      genre: 对联
  - scope:
      path: ""
      type: duilian_collections
    values:
      layout: duilian-collection
      genre: 对联合集
  - scope:
      path: ""
      type: sanwen
    values:
      layout: work
      genre: 散文
  # 弦外
  - scope:
      path: ""
      type: overtones
    values:
      layout: work
      genre: 弦外

# 不让 Jekyll 构建这些
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache